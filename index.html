<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Summary Component</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="card">
                <div class="card__image">
                    <img src="./img/illustration-hero.svg" alt="Illustration Hero">
                </div>
                <div class="card-content">
                    <h2 class="card__title">Order Summary</h2>
                    <p class="card__text">You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like</p>
                    <div class="card-block">
                        <div class="block-left">
                            <div class="block-left__image">
                                <img src="./img/icon-music.svg" alt="Icon Music">
                            </div>
                            <div class="block-left_plan">
                                <p class="block-left__text">Annual Plan</p>
                                <p class="block-left__price">$59.99/year</p>
                            </div>
                        </div>
                        <a href="#" target="_blank" class="block__link">Change</a>
                    </div>
                    <div class="buttons">
                        <button class="button-proceed">Proceed to Payment</button>
                        <a href="#" target="_blank" class="button-cancel">Cancel Order</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
